
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis - 3-Month Calisthenics + Dumbbell Program</title>
<style>
:root {
  --color-background-primary: #050505;
  --color-background-secondary: #121212;
  --color-text-primary: #ffffff;
  --color-text-secondary: #a0a0a0;
  --color-text-tertiary: #666666;
  --color-border-primary: #333333;
  --color-border-secondary: #222222;
  --color-border-tertiary: #1a1a1a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
  padding: 1.5rem; 
  background-color: var(--color-background-primary);
  color: var(--color-text-primary);
  line-height: 1.5;
}

h1 { font-size: 20px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 4px; letter-spacing: -0.02em; }
.subtitle { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 2rem; }

.month-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.mtab { 
  padding: 8px 18px; 
  border-radius: 10px; 
  border: 1px solid var(--color-border-secondary); 
  font-size: 14px; 
  cursor: pointer; 
  background: var(--color-background-secondary); 
  color: var(--color-text-secondary); 
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
}
.mtab.active { 
  background: var(--color-text-primary); 
  color: var(--color-background-primary); 
  font-weight: 600; 
  border-color: var(--color-text-primary); 
}

.day-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.dtab { 
  padding: 6px 14px; 
  border-radius: 8px; 
  border: 1px solid var(--color-border-secondary); 
  font-size: 13px; 
  cursor: pointer; 
  background: transparent; 
  color: var(--color-text-secondary); 
  transition: all 0.2s; 
}
.dtab.active { 
  background: #333; 
  color: var(--color-text-primary); 
  font-weight: 600;
  border-color: #444;
}

.card { 
  background: var(--color-background-secondary); 
  border: 1px solid var(--color-border-tertiary); 
  border-radius: 16px; 
  padding: 1.5rem; 
  margin-bottom: 1.5rem; 
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

.freq-row { display: flex; gap: 8px; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
.freq-tag { 
  font-size: 12px; 
  background: rgba(255,255,255,0.05); 
  border: 1px solid var(--color-border-secondary); 
  padding: 4px 12px; 
  border-radius: 20px; 
  color: var(--color-text-secondary); 
  font-weight: 500;
}

.badge { 
  display: inline-block; 
  font-size: 11px; 
  padding: 3px 10px; 
  border-radius: 20px; 
  margin-left: 8px; 
  text-transform: uppercase;
  font-weight: 700;
  letter-spacing: 0.05em;
}
.b1 { background: #0C447C; color: #B5D4F4; }
.b2 { background: #3C3489; color: #CECBF6; }
.b3 { background: #085041; color: #9FE1CB; }

.table-container {
  overflow-x: auto;
  margin-bottom: 1rem;
  border-radius: 12px;
  border: 1px solid var(--color-border-tertiary);
}

table { width: 100%; border-collapse: collapse; min-width: 600px; }
th { 
  font-size: 11px; 
  color: var(--color-text-tertiary); 
  text-align: left; 
  padding: 12px 16px; 
  border-bottom: 1px solid var(--color-border-secondary); 
  font-weight: 600; 
  text-transform: uppercase;
  letter-spacing: 0.1em;
  background: rgba(255,255,255,0.02);
}
td { 
  font-size: 14px; 
  color: var(--color-text-primary); 
  padding: 16px; 
  border-bottom: 1px solid var(--color-border-tertiary); 
  vertical-align: top; 
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.01); }

.ex-name-cell { display: flex; flex-direction: column; gap: 6px; }
.ex-name { font-weight: 600; }
.note { font-size: 12px; color: var(--color-text-secondary); line-height: 1.4; }

.src-db { font-size: 10px; background: rgba(12, 68, 124, 0.3); color: #B5D4F4; padding: 2px 8px; border-radius: 20px; display: inline-block; font-weight: 600; }
.src-cal { font-size: 10px; background: rgba(8, 80, 65, 0.3); color: #9FE1CB; padding: 2px 8px; border-radius: 20px; display: inline-block; font-weight: 600; }

a.yt { 
  display: inline-flex; 
  align-items: center; 
  gap: 6px; 
  font-size: 12px; 
  color: #ff4d4d; 
  text-decoration: none; 
  background: rgba(255, 77, 77, 0.1); 
  padding: 5px 12px; 
  border-radius: 8px; 
  transition: all 0.2s;
  font-weight: 500;
}
a.yt:hover { background: rgba(255, 77, 77, 0.2); transform: translateY(-1px); }

.tip-box { 
  background: rgba(83, 74, 183, 0.1); 
  border-left: 3px solid #534AB7; 
  border-radius: 4px 12px 12px 4px; 
  padding: 1.25rem; 
  font-size: 14px; 
  color: var(--color-text-secondary); 
  line-height: 1.6; 
  margin-top: 1rem; 
}
.tip-box strong { color: var(--color-text-primary); }

.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1.5rem; padding: 0.5rem 0; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--color-text-secondary); font-weight: 500; }
.dot-db { width: 10px; height: 10px; border-radius: 50%; background: #0C447C; box-shadow: 0 0 10px rgba(12,68,124,0.5); }
.dot-cal { width: 10px; height: 10px; border-radius: 50%; background: #085041; box-shadow: 0 0 10px rgba(8,80,65,0.5); }

@media (max-width: 600px) {
  body { padding: 1rem; }
  .card { padding: 1.25rem; }
  td, th { padding: 12px; }
  .mtab { padding: 6px 14px; font-size: 13px; }
}
</style>
</head>

let am = 0, ad = 0;

function renderAll() {
  const mtabs = document.getElementById('mtabs');
  mtabs.innerHTML = data.months.map((m, i) =>
    `<button class="mtab ${i===am?'active':''}" onclick="setM(${i})">${m.label}</button>`
  ).join('');
  
  const m = data.months[am];
  document.getElementById('mcontent').innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:10px;">
        <div style="display:flex;align-items:center;">
          <span style="font-size:18px;font-weight:700;color:var(--color-text-primary)">${m.title}</span>
          <span class="badge ${m.badge}">${m.badgeText}</span>
        </div>
        <div class="freq-row" style="margin-bottom:0">${m.freq.map(f=>`<span class="freq-tag">${f}</span>`).join('')}</div>
      </div>
      <div class="day-tabs" id="dtabs"></div>
      <div id="dcontent"></div>
      <div class="tip-box">💡 ${m.tip}</div>
    </div>`;
  renderDayTabs();
  renderDay();
}

function renderDayTabs() {
  const m = data.months[am];
  document.getElementById('dtabs').innerHTML = m.days.map((d,i) =>
    `<button class="dtab ${i===ad?'active':''}" onclick="setD(${i})">${d.label}</button>`
  ).join('');
}

function renderDay() {
  const d = data.months[am].days[ad];

    const srcBadge = e.src === DB

      : `<span class="src-cal">calisthenics</span>`;

    if (e.link && e.link2) {
      vid = \`<a class="yt" href="\${e.link}" target="_blank">▶ \${e.lt}</a><div style="height:6px"></div><a class="yt" href="\${e.link2}" target="_blank">▶ \${e.lt2}</a>\`;
    } else if (e.link) {
      vid = \`<a class="yt" href="\${e.link}" target="_blank">▶ \${e.lt}</a>\`;
    }
    return \`<tr>
      <td class="ex-name-cell">
        <span class="ex-name">\${e.name}</span>
        <div>\${srcBadge}</div>
        <div class="note">\${e.note}</div>
      </td>
      <td style="font-weight:700;color:#fff">\${e.sets}</td>
      <td style="font-weight:500">\${e.reps}</td>
      <td>\${vid}</td>
    </tr>\`;
  }).join('');

  document.getElementById('dcontent').innerHTML = `
    <div style="font-size:15px;font-weight:700;color:var(--color-text-primary);margin-bottom:4px;margin-top:1rem">\${d.title}</div>
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:1.25rem">\${d.sub}</div>
    <div class="table-container">
      <table>
        <thead><tr><th>Exercise</th><th>Sets</th><th>Reps</th><th>Video</th></tr></thead>
        <tbody>\${rows}</tbody>
      </table>
    </div>`;
}

function setM(i) { am=i; ad=0; renderAll(); }
function setD(i) { ad=i; renderDayTabs(); renderDay(); }
renderAll();
</script>
</body>
